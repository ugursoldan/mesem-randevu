# fly.toml app configuration file for MESEM Randevu Sistemi
# Generated by Hermes Agent

app = "mesem-randevu"
primary_region = "ams"  # Amsterdam - close to Turkey

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "mesem_data"
  destination = "/app/data"
