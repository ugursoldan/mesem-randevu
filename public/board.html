<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bugünkü Randevular - MESEM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1a237e, #283593);
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid rgba(255,255,255,0.08);
    }
    .header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .header h1 small {
      font-size: 16px;
      font-weight: 400;
      color: #90caf9;
      display: block;
    }
    .header .date {
      font-size: 22px;
      color: #8899aa;
    }
    .header .clock {
      font-size: 28px;
      font-weight: 600;
      color: #4fc3f7;
      font-variant-numeric: tabular-nums;
    }

    .stats {
      display: flex;
      gap: 20px;
      padding: 16px 40px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
    }
    .stat-item .num {
      font-size: 26px;
      font-weight: 700;
    }
    .stat-item.pending .num { color: #ffa726; }
    .stat-item.confirmed .num { color: #66bb6a; }
    .stat-item .label { color: #8899aa; }

    .board {
      padding: 24px 40px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
      height: calc(100vh - 140px);
      overflow-y: auto;
    }

    .card {
      background: linear-gradient(135deg, #1a1a2e, #222240);
      border-radius: 16px;
      padding: 24px;
      border-left: 5px solid #ffa726;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .card.confirmed {
      border-left-color: #66bb6a;
      background: linear-gradient(135deg, #1a2e1a, #224022);
    }

    .card .time-badge {
      font-size: 28px;
      font-weight: 700;
      color: #ffa726;
    }
    .card.confirmed .time-badge { color: #66bb6a; }

    .card .student {
      font-size: 24px;
      font-weight: 600;
      margin: 8px 0 4px;
    }

    .card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 16px;
      color: #aabbcc;
      margin-top: 8px;
    }
    .card .meta .tag {
      background: rgba(255,255,255,0.08);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .card .parent {
      font-size: 16px;
      color: #8899aa;
      margin-top: 6px;
    }

    .card .status-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .status-badge.pending { background: rgba(255,167,38,0.2); color: #ffa726; }
    .status-badge.confirmed { background: rgba(102,187,106,0.2); color: #66bb6a; }

    .empty {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      color: #556677;
    }
    .empty .icon { font-size: 80px; margin-bottom: 20px; }
    .empty p { font-size: 28px; }

    .board::-webkit-scrollbar { width: 8px; }
    .board::-webkit-scrollbar-track { background: transparent; }
    .board::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    @media (max-width: 768px) {
      .header { padding: 16px 20px; flex-wrap: wrap; gap: 10px; }
      .header h1 { font-size: 22px; }
      .board { padding: 16px 20px; grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>📋 Bugünkü Randevular <small>Sarıyer Atatürk MESEM</small></h1>
      <div class="date" id="dateDisplay"></div>
    </div>
    <div class="clock" id="clockDisplay"></div>
  </div>

  <div class="stats" id="stats">
    <div class="stat-item pending"><span class="num" id="pendingCount">0</span> <span class="label">Bekleyen</span></div>
    <div class="stat-item confirmed"><span class="num" id="confirmedCount">0</span> <span class="label">Onaylanan</span></div>
  </div>

  <div class="board" id="board"></div>

  <script>
    const today = new Date().toISOString().split('T')[0];

    function formatDateTR(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
      const days = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
      return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}, ${days[d.getDay()]}`;
    }

    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clockDisplay').textContent = `${h}:${m}:${s}`;
    }

    function statusLabel(status) {
      const map = { pending: 'Bekliyor', confirmed: 'Onaylandı' };
      return map[status] || status;
    }

    // Saat aralığından başlangıç saatini al ("09:00-09:20" -> "09:00")
    function slotStart(slot) {
      return slot.split('-')[0];
    }

    async function loadBoard() {
      try {
        const res = await fetch(`/api/board?date=${today}`);
        const appointments = await res.json();
        const board = document.getElementById('board');

        // Saati geçen bekleyenleri çıkar
        const now = new Date();
        const curTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        const filtered = appointments.filter(a => {
          if (a.status === 'cancelled' || a.status === 'completed') return false;
          if (a.status === 'pending' && slotStart(a.time_slot) < curTime) return false;
          return true;
        });

        // Stats
        const counts = { pending: 0, confirmed: 0 };
        filtered.forEach(a => { counts[a.status] = (counts[a.status] || 0) + 1; });
        document.getElementById('pendingCount').textContent = counts.pending;
        document.getElementById('confirmedCount').textContent = counts.confirmed;

        if (filtered.length === 0) {
          board.innerHTML = `
            <div class="empty">
              <div class="icon">📭</div>
              <p>Bugün için bekleyen randevu kalmadı</p>
            </div>
          `;
          return;
        }

        // Sort by time slot
        filtered.sort((a, b) => a.time_slot.localeCompare(b.time_slot));

        board.innerHTML = filtered.map(a => `
          <div class="card ${a.status}">
            <div style="display:flex;justify-content:space-between;align-items:start;">
              <div class="time-badge">${a.time_slot}</div>
              <span class="status-badge ${a.status}">${statusLabel(a.status)}</span>
            </div>
            <div class="student">${a.student_name}</div>
            <div class="meta">
              <span class="tag">📚 ${a.grade}</span>
              <span class="tag">🏫 ${a.department}</span>
            </div>
            <div class="parent">👨‍👩‍👧 ${a.parent_name} — 📞 ${a.phone}</div>
            ${a.notes ? `<div style="font-size:15px;color:#667788;margin-top:6px;">📝 ${a.notes}</div>` : ''}
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('board').innerHTML = `
          <div class="empty">
            <div class="icon">⚠️</div>
            <p>Veri yüklenemedi</p>
          </div>
        `;
      }
    }

    // Init
    document.getElementById('dateDisplay').textContent = formatDateTR(today);
    updateClock();
    loadBoard();

    setInterval(updateClock, 1000);
    setInterval(loadBoard, 15000);
  </script>
</body>
</html>
